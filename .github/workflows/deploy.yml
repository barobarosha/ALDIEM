name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check files in app
        run: |
          echo "=== Files in app ==="
          ls -la ./app/
          echo "=== package.json ==="
          cat ./app/package.json | head -20
      
      - name: Install dependencies
        run: |
          cd app
          npm install --legacy-peer-deps
      
      - name: Check node_modules
        run: |
          echo "=== node_modules exists? ==="
          ls -la ./app/node_modules/ | head -10
          echo "=== gsap exists? ==="
          ls ./app/node_modules/gsap 2>/dev/null || echo "GSAP NOT FOUND"
      
      - name: Build
        run: |
          cd app
          npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './app/dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
