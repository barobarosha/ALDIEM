name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Debug - list files
        run: ls -la ./app/
      
      - name: Debug - check package.json
        run: cat ./app/package.json | head -5
      
      - name: Install deps
        run: |
          cd app
          rm -f package-lock.json
          npm install 2>&1
          echo "EXIT CODE: $?"
      
      - name: Debug - check node_modules
        run: ls ./app/node_modules/ | head -10
      
      - name: Build
        run: cd app && npm run build
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './app/dist'
      
      - uses: actions/deploy-pages@v4
        id: deployment
